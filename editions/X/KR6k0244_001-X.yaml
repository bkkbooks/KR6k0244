body:
  text: 重定授菩薩戒法若諸菩薩欲學菩薩三聚淨戒或是在家或是出家先於無上菩提發弘願已審求功德具足有智有力菩薩法師先禮雙足偏袒右肩膝輪據地合掌恭敬作如是請大德憶念我某甲於大德所乞受一切菩薩淨戒惟願須臾不辭勞倦哀愍聽授如是三說既請師已乃徃像前燒香致敬或復清眾為舉香讚香讚既畢一心恭敬向十方三寶翹勤禮拜一心頂禮過去世盡過去際一切諸佛一心頂禮未來世盡未來際一切諸佛一心頂禮現在世盡現在際一切諸佛一心頂禮過去世盡過去際一切尊法一心頂禮未來世盡未來際一切尊法一心頂禮現在世盡現在際一切尊法一心頂禮過去世盡過去際一切賢聖一心頂禮未來世盡未來際一切賢聖一心頂禮現在世盡現在際一切賢聖各一禮已次復𨃰下恭敬膝輪著地對佛像前合掌請師惟願大德哀愍授我菩薩淨戒請已專念一境長養淨心作是思惟我今不久當得無盡無量無上功德藏爾時戒師應問言善男子聽汝是菩薩不答是言發菩提願未答言已發善男子聽汝等今者欲於我所受諸菩薩一切學處受諸菩薩一切淨戒謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學汝能受不答言能受如是三問答已次應語言佛子應受四不壞信此下歸依悔過發願三節皆應自說如或不能師應教授從今時盡未來際身歸依佛歸依法歸依賢聖僧歸依正法戒如是三說佛子次應悔三世罪若過去身口意十惡罪願畢竟不起盡未來際若現在身口意十惡罪願畢竟不起盡未來際若未來身口意十惡罪願畢竟不起盡未來際如是三說佛子如是悔過已三業清淨如淨瑠璃內外明照次應發四弘誓願眾生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成如是三說佛子既發弘誓願竟我當為汝啟白三寶證明受戒汝應一心善聽作意諦思當知初番白竟十方世界妙善戒法由心業力悉皆震動二番白竟十方世界妙善戒法如雲如葢覆汝頂上三番白竟十方世界妙善戒法從汝頂門流入身心充滿正報盡未來際永為佛種此是無作戒體無漏色法由汝增上善心之所感得是故汝應至誠頂受爾時受戒者胡跪如故戒師起座對佛像前普於十方現在三寶恭敬供養頂禮合掌作如是白仰啟十方無邊無際諸世界中諸佛菩薩今於此中現有某甲菩薩於我某甲菩薩所乃至三說受菩薩戒我為作證惟願十方無邊無際諸世界中諸佛菩薩第一真聖於現不現一切時處一切有情皆現覺者於此某甲受戒菩薩亦為作證如是三說次應復座為說十重戒相勸持善男子聽菩薩有十無盡戒若有犯者非菩薩行失四十二賢聖法汝應諦受從今身至佛身於其中間不得故殺生能持不答言能從今身至佛身於其中間不得故偷盜能持不答言能從今身至佛身於其中間不得故婬欲能持不答言能從今身至佛身於其中間不得故妄語能持不答言能從今身至佛身於其中間不得故酤酒能持不答言能從今身至佛身於其中間不得故說在家出家菩薩罪過能持不答言能從今身至佛身於其中間不得故自讚毀他能持不答言能從今身至佛身於其中間不得故慳能持不答言能從今身至佛身於其中間不得故瞋能持不答言能從今身至佛身於其中間不得故謗三寶藏能持不答言能佛子受十無盡戒已其受者過度四魔越三界苦從生至生不失此戒常隨行人乃至成佛當知如是菩薩所受淨戒於餘一切所受淨戒最勝無上無量無邊大功德藏之所隨逐第一最上善心意樂之所發起普能除滅於一切有情一切種惡行一切別解脫律儀於此菩薩律儀戒百分不及一千分不及一數分計分算分喻分乃至鄔波尼殺曇分亦不及一攝受一切大功德故受授菩薩俱起頂禮十方三寶清眾同稱受戒功德殊勝行無邊勝福皆迴向普願沉溺諸眾生速往無量光佛剎十方三世一切佛諸尊菩薩摩訶薩摩訶般若波羅蜜禮三寶畢受戒菩薩次應禮謝戒師及諸大眾恭敬而退重定授菩薩戒法䟦語竊觀比丘受戒律有定式五部雖殊大同小異故應專遵四分削後竄之繁文菩薩受法經論各異梵網瓔珞地持善戒以及心地觀等被機既別詳略互殊是以制旨教行等各抒己意增設科條雖辭美意詳並殫其致然或義因文隱反不若經論之痛快直捷今梵網受法已失其傳僅存影略惟地持瓔珞的可依承敬酌三家會成一式庶俾詳簡適中而授者受者皆得明白簡易以免紊雜之過耳時崇禎四年辛未季秋古吳智旭謹識學菩薩戒法明菩薩戒弟子古吳智旭述佛前自誓受戒肇於梵網詳於地持瓔珞等經今參以諸經行法總出十意一嚴道場二淨三業三結界四修供養五讚禮歸依六悔除惡罪七啟白請證八正誦戒經九發誓禮佛十發願迴向一嚴道場住於靜室設盧舍那像或釋迦像或但𦘕像亦得然須有佛像不得單供菩薩像也懸幡然燈香華飲食以用供養或一七日二三七日乃至一年三年晝夜六時勤而行之若不能日日設供初日決不可闕或見好相為期或但發好心終身行之若晝夜共三徧若二若一但令相續不斷嚴護不侵必為諸佛攝受矣二淨三業若出家人先須受具足戒或沙彌戒清淨無犯若在家人先須全受五戒無有毀犯次應發廣大菩提心誓欲紹隆佛種盡度一切眾生方堪受菩薩戒應於靜處澡潄清淨著如法服攝心正念口無雜言但當殷勤存想三寶求其哀祐三結界行者於建首日未禮敬前當齊修行處如法結界以摩訶悉怛哆般怛羅無上神呪加持淨水灑著四方為界或終身行之者無定壇場但於每時先遶像經行誦呪一徧亦得經云有此呪地十二由旬成結界地也若在家人不能誦全呪者用大悲神呪亦可四修供養行者依法結界已至尊像前先敷具拱立至心運想十方三世無窮無盡一切三寶起深信解如對目前口當唱云一切恭敬一心頂禮十方常住三寶一禮已胡跪添香捧華作是唱云嚴持香華如法供養願此香華雲徧滿十方界一一諸佛土無量香莊嚴具足菩薩道成就如來香散華畢次復想云我此香華徧十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴徧至十方三寶前十方法界三寶前悉有我身修供養一一皆悉徧法界彼彼無雜無障礙盡未來際作佛事普熏法界諸眾生蒙熏皆發菩提心同入無生證佛智想已起立唱云供養已一切恭敬一拜五讚禮歸依次復胡跪合掌作是唱云如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我歸依善調心過惡及與身四種到不思議地故我今敬禮知諸爾𦦨法智身無罣礙於法無忘失故我今敬禮稽道過無量稽首無倫等稽首法自在稽首超思惟哀愍覆護我令法種增長逮及最後身常在如來前我所修福業此世及餘生由斯善根力願佛恒攝受讚已一叩首次起立唱云一心頂禮過去世盡過去際一切諸佛拜下想云能禮所禮性空寂感應道交難思議我此道場如帝珠一切諸佛影現中我身影現諸佛前為求大戒接足禮至禮賢聖即以諸佛二字改作賢聖二字一心頂禮未來世盡未來際一切諸佛一心頂禮現在世盡現在際一切諸佛一心頂禮過去世盡過去際一切諸佛想云真空法性如虗空常住法寶難思議我身影現法寶前一心如法歸命禮一心頂禮未來世盡未來際一切尊法一心頂禮現在世盡現在際一切尊法一心頂禮過去世盡過去際一切賢聖一心頂禮未來世盡未來際一切賢聖一心頂禮現在世盡現在際一切賢聖各一禮已胡跪唱言我弟子某甲從今時盡未來際身歸依佛歸依法歸依賢聖僧歸依正法戒三說已一叩首六悔除惡罪應當緣念無始已來迷自本心無惡不造深自慚愧永斷相續懇切自責至心唱云我弟子某甲若過去身口意十惡罪願畢竟不起盡未來際若現在身口意十惡罪願畢竟不起盡未來際若未來身口意十惡罪願畢竟不起盡未來際三說已一叩首仍默想云我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔想已自念罪障已滅身心清淨猶如瑠璃七敬白請證仍前胡跪至心白云仰啟十方一切如來已入大地諸菩薩眾我今欲於十方世界佛菩薩所誓受一切菩薩學處誓受一切菩薩淨戒謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學惟願十方無邊無際諸世界中諸佛菩薩第一真聖於現不現一切時處一切有情皆現覺者於弟子某甲受菩薩戒為作證明三說已一叩首若恒課者一說亦得八正誦戒經或胡跪像前或於像側設一小座就坐而誦或能背熟戒經經行誦之亦得仍須添香致敬先應合掌三稱南無梵網教主盧舍那佛無上甚深微妙法百千萬億劫難遇我今見聞得受持願解如來真實義次誦梵網經心地品或全誦上下二卷或但誦下卷或以下卷分作二時三時乃至六時隨力誦之誦時當令字句分明勿有差脫九發誓禮佛經畢仍須添香致敬胡跪像前先三稱南無本師釋迦牟尼佛次發誓云如是戒品我今於一切三寶前誓願受持修學盡未來際不復捨離假使持戒因緣百千萬劫恒受困苦誓以不苦故退失今日道心假使破戒因緣百千萬劫恒受安樂誓不以樂故退失今日道心以此學戒功德願我及眾生從無始世來所作眾罪盡得消滅若一切眾生所有定業當受報者我皆代受徧微塵國歷諸惡道經微塵劫備嘗眾苦歡喜忍受終無厭悔令彼眾生先成佛道我所發願真實不虗願十方三寶現為我證手摩我頭衣覆我體甘露灌頂光明炤身令我道心日夜增長入諸三昧得陀羅尼文殊智海念念清淨普賢行海念念圓成命終之後生諸佛前證不思議解脫境界普能遊戲出入塵勞盡度迷流同登覺岸虗空有盡我願無窮歸命頂禮一切三寶一心頂禮梵網教主盧舍那佛三禮一心頂禮本師釋迦牟尼佛一心頂禮西方極樂世界阿彌陀佛一心頂禮藥師瑠璃光佛一心頂禮過去七佛十方十佛一心頂禮三十五佛五十三佛百七十佛一心頂禮莊嚴劫千佛賢劫千佛星宿劫千佛一心頂禮盡十方三世一切諸佛一心頂禮梵網經菩薩心地品微妙尊法三禮一心頂禮大小乘毗柰耶藏及十方三世一切尊法一心頂禮玄通華光主菩薩摩訶薩一心頂禮華光王大智明菩薩摩訶薩一心頂禮藥王菩薩藥上菩薩摩訶薩一心頂禮觀世音菩薩大勢至菩薩摩訶薩一心頂禮地藏菩薩金剛藏菩薩虗空藏菩薩摩訶薩一心頂禮文殊師利菩薩普賢菩薩摩訶薩一心頂禮一生補處彌勒菩薩摩訶薩一心頂禮盡十方三世一切菩薩摩訶薩一心頂禮優波離尊者大迦葉尊者阿難陀尊者一切緣覺聲聞賢聖僧觀想偈如前應知若作常課於道行疲病等時不能禮拜者隨於四威儀中但瞑目運心作禮拜想其功德與五體投地無異十發願迴向禮佛竟仍須添香致敬胡跪合掌說是弘願稽首三身圓滿尊一切真如覺性海稱彼法界等虗空種種莊嚴大願海果因交徹不思議菩薩一切修行海亦禮阿彌陀如來觀音勢至及地藏我為慈親罔極恩徧憫一切眾生界發生如實增上心修行念佛勝方便深信淨土攝受門廣大誓願普皆被妙戒為舟智慧舵方便為帆佛力風盡未來際渡眾生終不一念捨五濁諸佛願海如帝珠攝於我願重重現我願亦如摩尼王諸佛願海悉皆攝願輪橫徧於十方亦復豎窮於三際一切智智之所乘故我至心勤修習第一願者我發本心為欲上報慈父生我之恩惟願三寶慈悲力令我無始以來經生慈父咸生淨土速證菩提能令聞我名者亦得上報父恩第二願者我本發心為欲上報悲母養育之恩惟願三寶慈悲力令我無始以來經生悲母咸生淨土速證菩提能令聞我名者亦得上報母恩第三願者願度法界虗空界一切眾生盡成佛竟我然後方取泥洹第四願者願我婬機身心俱斷斷性亦無能令聞我名者亦得永斷婬根第五願者願我殺害業習滅盡無餘能令聞我名者徧生慈力第六願者願我癡闇謗三寶業滅盡無餘能令聞我名者正信三寶第七願者願我諸不善業悉得清淨能令聞我名者安住梵行第八願者願我決生極樂世界速證無上菩提分身塵剎度脫眾生盡未來際無有疲厭第九願者願我生生世世不忘本願於五濁世善化眾生第十願者願我在在處處弘通正法無諸魔障十一願者願得無量智慧善能通達一切佛法十二願者願得無量辯才開導羣迷降伏外道一切無畏如師子吼十三願者願得無量神通徧至十方國土承事一切如來及善知識一切海會無不得與十四願者願我能出種種微妙音聲盡未來際讚歎三寶令諸眾生知所歸依十五願者願能隨意出生種種微妙供養供養三寶為諸眾生作大福田十六願者十方一切眾生所有功德我皆隨喜令其成就無上菩提十七願者十方如來成正覺時我先勸請轉大法輪開示眾生無上覺路十八願者十方如來般涅槃時我悉勸請莫入涅槃常住世間饒益含識十九願者十方如來會中推我為大法王子佛於一切海會讚我功德智慧慈悲願力如觀世音如地藏王等無有異二十願者願以大悲光明炤諸地獄觸我光者應時變諸苦事成勝妙樂二十一願者願以大悲光明炤諸餓鬼觸我光者應時捨餓鬼身得淨土生二十二願者願以大悲光明炤諸畜生蒙我光者離諸怖畏捨身之後得淨土生二十三願者願以大悲光明炤諸鬼神蒙我光者悉捨瞋心開悟佛道捨諸醜陋得清淨身二十四願者願以大悲光明炤諸苦惱眾生蒙我光者疾病消除六根具足一切危難皆解脫無量恐怖悉捐除無病延年發菩提意若臨命終即生淨土二十五願者願以大悲光明炤觸有形無形有想無想及諸魔外令其身心捨諸邪見通達佛乘二十六願者願以大悲光明炤觸人天令其不迷欲樂及欣厭定各各勤求無上菩提二十七願者願以大悲光明炤諸聲聞緣覺令其捨無為證速趨佛乘二十八願者願以大悲音聲開示一切眾生令諸眾生決定明悟不戀三界不樂餘乘惟求無上菩提二十九願者願以大悲神力隨順眾生種種所求恒令如願俾於我法生深信心三十願者我以救度眾生故願於十方現作佛身或現淨土攝取眾生莊嚴殊勝踰於極樂或現穢土化導眾生方便無量調伏惡友三十一願者我以救度眾生故願於隨類現身一一類中種族尊勝威德自在令諸同類恭敬愛慕如所教誨直至菩提三十二願者一切無佛法處一切法滅處一切佛法不能行處我誓以大悲方便現身於中隱顯大化為長夜燈救拔沉冥出於苦海三十三願者願我恒於眾生餓渴之時現作飲食疾疫之時現作藥草寒凍之時現作衣服熱惱之時現作凉風險阻之處現作津梁乃至眾生一切所須皆現作之令諸眾生若服若食若倚若履咸得安樂發菩提心三十四願者若諸眾生樂求佛乘聞我名已不捨肉身得佛菩提證於究竟三十五願者若諸菩薩莊嚴佛土聞我名已其國勝妙踰於極樂欲現穢土則得無量方便善化剛強難化眾生三十六願者若諸眾生欲見諸佛淨土聞說法音我願令彼皆得見聞三十七願者若諸眾生欲往無數世界供養三寶願令一念之間普得周徧三十八願者若諸眾生欲生諸佛淨土聞我名號即得隨願往生三十九願者若諸眾生同我誓願速得無量智慧方便威德自在四十願者若有眾生樂求小乘我願令彼速登聖果即便迴心入菩薩乘四十一願者願諸十方修行菩薩聞我名號直至菩提永無魔事四十二願者願諸十方邪魔外道聞我名號即捨邪見同歸正覺四十三願者若有眾生身具五逆十惡四棄八棄當墮大地獄中我願以大悲心力使知求哀懺悔隨現勝妙色身至其人前摩頂安慰令彼罪根永拔發菩提心四十四願者若有眾生或謗我法或詈我名彼雖障重我誓以平等大慈悲力令其滅惡速趨菩提四十五願者願我慈眼最極清淨普視盡虗空界乃至極苦之處悉令安樂極惡眾生悉令賢善四十六願者願我印手最極莊嚴於念念中出生一切諸供養雲諸珍寶雲諸衣服雲諸眾具雲諸飲食雲諸醫藥雲諸三昧雲諸總持雲諸辯才雲諸光炤雲徧虗空界利益眾生盡未來際無有斷絕四十七願者願我名號最極高遠盡十方界靡不周徧乃至法滅之處我名不滅恒令眾生若聞若稱悉得解脫四十八願者願我色身最極微妙以不可說不可說佛剎極微塵數大人之相而自莊嚴一一相有不可說不可說佛剎極微塵數隨形好一一好有不可說不可說佛剎極微塵數光明一一光明皆作不可說不可說佛剎極微塵數色嚴飾國界皆演不可說不可說佛剎極微塵數聲宣揚妙法皆發不可說不可說佛剎極微塵數香普熏一切皆出不可說不可說佛剎極微塵數上妙飲食供養一切皆雨不可說不可說佛剎極微塵數衣服眾具普施一切皆現不可說不可說佛剎極微塵數化佛教化一切一一化佛皆有不可說不可說佛剎極微塵數諸佛菩薩以為眷屬一一菩薩皆有不可說不可說佛剎極微塵數殊勝莊嚴一一莊嚴皆作不可說不可說佛剎極微塵數廣大佛事一一佛事皆於不可說不可說佛剎極微塵數世界利益眾生其有眾生見一佛事則得見我微妙色身見我身者則能與我平等則能速得成佛願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切眾生界彼佛眾會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大徧十方普利一切眾生界乃至虗空世界盡眾生及業煩惱盡如是一切無盡時我願究竟恒無盡我此廣大殊勝願無邊勝福皆迴向普願沉溺諸眾生速往無量光佛剎十方三世一切佛諸尊菩薩摩訶薩摩訶般若波羅蜜次起唱三自歸自歸依佛當願眾生體解大道發無上心自歸依法當願眾生深入經藏智慧如海自歸依僧當願眾生統理大眾一切無礙和南聖眾發願之法各隨所樂或樂學阿彌陀佛四十八願藥師如來十二大願及普賢菩薩十願王等隨意用之未必專令依此願也又或隨自意樂欲發種種諸願或廣或略亦無不可但令與四弘誓願相合斯無過矣善學者幸自擇焉此學戒法定於戊辰之夏業已刊入毗尼後集今癸未夏日重更一二附於梵網合註之後此後當以是為準云藕益智旭敬識學菩薩戒法毗尼後集問辯問梵網云於未受戒人前說七佛教戒者犯輕垢罪若謂但遮誦時不遮講時者誦時僅宣文句講時備解義理重筌輕魚有何意旨答比丘戒法關係僧輪為防賊住故一切俱遮菩薩戒法普収五道解義發心事非所禁但誦戒時恐有發露懺悔之事不合令未受者知故云不得說也問菩薩戒本止列四重梵網廣明十重詳略不同又梵網犯十重者必見好相方許更受戒本但云失菩薩戒應當更受寬嚴有異此二經典一是本師和尚宣揚一是授戒闍梨親述不應互相違反畢竟如何會通答戒本出於地持地持合殺盜婬妄共名出家八重善生問經列殺盜婬妄酤酒說過名優婆塞六重梵網備二經之義總為十重瓔珞亦同良繇所被之機不等故詳略之致有殊今戒本止列四事復有三義一者在家欲受此戒必已先受五戒出家欲受此戒必已先受十戒具戒殺盜婬妄既是根本性重不須更列故惟列此增上戒法也二者菩薩戒法逆順無方為眾生故容可少分現行性罪此之四戒理無開許故獨列之三者根本四罪一犯永墮受五戒十戒具戒時已明斯義大乘教門雖通懺悔必以見相為期此之四法犯雖失戒猶堪更受恐濫前四故獨列之若梵網謂犯重必須見好相者正繇釋迦是大戒和尚一往立法不得不嚴而彌勒既作授戒闍梨輕重開遮理須詳悉今應准諸經論參合發明當知殺盜等四隨犯一種諸戒並失得見好相大可重受而比丘法中仍無僧用酤酒等六隨犯一種失菩薩戒具戒以下不名為失故殷勤悔過許其重受此二經所以互相影略非相違也問比丘法中遮罪難緣乃開今大士律儀為利他故性罪有開遮罪無文此義云何又逆順二行若階聖位則自他能益倘凡夫初學身心力弱自尚有虧安能利人或駕言菩薩藉口悲心順情所作為有罪否答遮罪為護眾生大士皆應同學惟住少利少作少方便者不共學之若難緣所開既已同聲聞學何須更開惟此性罪一向但遮故須開也就開聽中不揀凡聖但令果出悲心願代他苦深生慚愧不以為功則戒身無恙倘駕言藉口率意任情止成自欺必虧戒體莫貪大士之虗名而招長夜之苦報也問受戒羯磨文中若無授者聽佛像前自受梵網自誓受戒必須要見好相不得好相不名得戒復云何通答受戒一事須論因緣因是內心殷重緣是授受分明約修證則貴因深約教道則藉緣具是以比丘律藏嚴住持僧寶之體專重眾緣瓔珞地持開趨向菩提之路但觀因地梵網最初結戒理須二法並扶故雖許自受必以見相為期也又復應知如起信所明或有眾生以大悲故能自發心或因正法欲滅以護法因緣故能自發心復有見佛色相而發其心今梵網制令求見好相所以使其發趨菩提地持許其像前得受則但指彼已發心者是則梵網嚴於立法地持嚴於擇人亦互為表裏也復次瓔珞經云諸佛菩薩現在前受名上品戒法師相授名中品戒千里無師像前自受名下品戒亦無求見好相之言然猶一往約外緣分別耳復有論云發增上心得增上戒又云心無盡故戒亦無盡是則亦可約內因分上中下也今人求戒大須自審果能念念與悲智相應上荷正法下憫含生便可直遵瓔珞地持設不遇師亦得自受如或雖希佛道悲智未深則須秉持梵網法門千里無師必求好相更或現有明師心存憍慢不從求受別向像求斯則兩經咸所不聽五悔終不成功既欲遠趨極果豈容因地不真豪傑之士斷不宜自欺自誑矣問大乘重在內因今時律師與人受菩薩戒可知其內因真否如或不真名得戒否如不得戒則設犯十重還以十重定其罪否答菩薩戒羯磨文中具有觀察當機之法若不能知其內因而妄相傳授不免無解作師之過彼受戒者不善無記心中雖不發戒然既濫膺菩薩之名自當依法判罪非若比丘戒中竟以賊住論也問懺罪羯磨中許向小乘悔過梵網經中不得向未受菩薩戒者前說此千佛大戒尚不應向說況可向悔過耶又云何通答小乘雖未受菩薩戒而是住持僧寶堪受懺悔又聲聞人雖未識長者是父實是長者真子非餘一切未受戒者可比也至於半月說戒遣之令出則是布薩常規亦是彈斥微旨不可執此而難彼矣問梵網初輕戒中見上座和尚阿闍梨等應如法供養四十一戒中教誡師應教請二師又五逆加弒二師成七今授菩薩戒云何止有一師既得戒已稱誰為和尚耶答若准經文似須二師然瓔珞地持並止一師又梵網受法傳自什師載於義疏亦止一師所云請二師者恐即是請佛菩薩耳所云應如法供養二師及弒二師成逆則徧指比丘戒等二師亦可問重定受戒法中初時問答既已發菩提願云何悔罪之後復令發於四弘豈不招重繁之過答菩提心者非止一發惟應數發令菩提心相續不斷況前是審因今是秉法前是發心向道今是誓鎧莊嚴豈云重複且如先已請師像前復請又如授比丘戒屏問遮難僧中復問亦可云重繁耶問既謂機感有殊授法不一則若簡若繁俱無乖舛既謂增設科條義因文隱則直宗一轍更為痛快何必會三家成一式方為契理契機答理無多致機貴隨宜直宗一轍其說甚當但根器不同習性各別始予獨遵慈氏羯磨往往有嫌其太略者既法可融通何妨參酌乃敢折衷會三為一但用經論成言更不別加文飾三典現並流通想是機宜有在聊順一時之機匪敢執今非古可用與否一任後賢毗尼後集問辯
